packages:
 - docs
 - packages/*

# Supply-chain cooldown: don't install package versions published less than a day
# ago (mitigates a compromised-release window). Trusted publishers are excluded so
# our own/closely-tracked packages still update immediately.
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
 - '@kitql/*'
 - kitql-lint
 - vite-plugin-kit-routes
 - vite-plugin-stripper
 - vite-plugin-watch-and-run
 - remult

catalogs:
 docs:
  '@astrojs/starlight': 0.41.3
  accessible-astro-components: 5.3.1
  astro: 6.4.8
  astro-icon: 1.1.5
  sharp: 0.35.3
  prettier-plugin-astro: 0.14.1

 best:
  remult: 3.3.16

 tooling:
  '@typescript/native-preview': 7.0.0-dev.20260112.1
  vite: 7.3.1
  '@tsconfig/svelte': 5.0.2
  tslib: 2.8.0
  vite-plugin-watch-and-run: 1.8.2
  vite-plugin-kit-routes: 1.0.6
  vite-plugin-stripper: 0.10.4
  esm-env: 1.2.2
  prettier: 3.8.1

 kitql:
  '@kitql/helpers': 0.8.15
  '@kitql/eslint-config': 0.9.0
  eslint: 10.7.0

 testing:
  '@playwright/test': 1.60.0
  '@vitest/browser': 3.2.3
  playwright: 1.60.0
  vitest: 3.2.3

 lib-author-helper:
  '@changesets/changelog-github': 0.7.0
  '@changesets/cli': 2.31.0

 svelte:
  'svelte': 5.40.0
  svelte-check: 4.6.0
  svelte-micro: 2.5.7

 sveltekit:
  '@sveltejs/adapter-node': 5.5.4
  '@sveltejs/kit': 2.46.5
  '@sveltejs/vite-plugin-svelte': 6.2.1
  '@sveltejs/package': 2.5.4

 ui:
  '@mdi/js': 7.4.47
  tailwindcss: 4.3.0
  '@tailwindcss/vite': 4.3.0
  tailwind-merge: 3.6.0
  clsx: 2.1.1
  svelte-sonner: 1.1.1

 prod:
  '@types/nodemailer': 8.0.0
  nodemailer: 8.0.5
  cron: 4.4.0
  '@layerstack/utils': 1.0.0
